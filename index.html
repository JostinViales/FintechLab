<!DOCTYPE html>
<html lang="en" class="no-transitions">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="description"
    content="WealthFlow Tracker - Track your finances, budget, and savings with AI-powered insights" />
  <title>WealthFlow Tracker</title>

  <!-- Inline script to set theme before first paint -->
  <script>
    (function () {
      const stored = localStorage.getItem('wealthflow-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');

      document.documentElement.setAttribute('data-theme', theme);

      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) {
        meta.setAttribute('content', theme === 'dark' ? '#0f172a' : '#4f46e5');
      }
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
